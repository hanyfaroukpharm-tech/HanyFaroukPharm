<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم — صيدلية د. هاني فاروق</title>
  
  <link rel="manifest" href="manifest-admin.json">
  <meta name="theme-color" content="#0d1f35">
  <link rel="icon" type="image/avif" href="images/adminlogo.avif">
  <link rel="apple-touch-icon" href="images/adminlogo.avif">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Cairo',sans-serif; background:#0d1f35; color:#e2eaf4; }
    .card { background:#132640; border:1px solid rgba(56,189,248,0.12); border-radius:1.25rem; }
    .grad { background:linear-gradient(135deg,#0284c7,#0369a1); }
    .status-waiting  { background:rgba(234,179,8,0.15);  color:#fbbf24; border:1px solid rgba(234,179,8,0.3); }
    .status-progress { background:rgba(59,130,246,0.15); color:#60a5fa; border:1px solid rgba(59,130,246,0.3); }
    .status-done     { background:rgba(34,197,94,0.15);  color:#4ade80; border:1px solid rgba(34,197,94,0.3); }
    .status-cancel   { background:rgba(239,68,68,0.15);  color:#f87171; border:1px solid rgba(239,68,68,0.3); }
    .filter-btn   { background:#1a3352; color:#7a9bbf; border:1px solid rgba(56,189,248,0.1); transition:all .2s; }
    .filter-active{ background:linear-gradient(135deg,#0284c7,#0369a1)!important; color:white!important; box-shadow:0 4px 12px rgba(2,132,199,0.4); }
    .no-scrollbar::-webkit-scrollbar{display:none;}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
    .pulse-dot { animation:pulseDot 1.5s infinite; }
    @keyframes pulseDot { 0%,100%{box-shadow:0 0 0 0 rgba(234,179,8,0.5)} 50%{box-shadow:0 0 0 8px rgba(234,179,8,0)} }
    .card-enter { animation:fadeUp .3s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    select { background:#1a3352; color:#e2eaf4; border:1px solid rgba(56,189,248,0.2); border-radius:.75rem; padding:8px 12px; font-family:'Cairo',sans-serif; font-size:12px; width:100%; }
    
    /* تنسيق إضافي لصورة اللوجو */
    .admin-logo-img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
  </style>
</head>
<body class="min-h-screen">

<audio id="notification-sound" src="images/notification.mp3" preload="auto"></audio>

<div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
  <div class="card w-full max-w-sm p-8 text-center">
    <div class="grad w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg overflow-hidden border-2 border-white/10">
      <img src="images/adminlogo.avif" alt="Admin Logo" class="admin-logo-img">
    </div>
    <h1 class="text-xl font-black mb-1">لوحة التحكم</h1>
    <p class="text-sm mb-6" style="color:#7a9bbf">صيدلية د. هاني فاروق</p>
    <input id="password-input" type="password" placeholder="كلمة المرور"
      class="w-full p-3 rounded-2xl text-center text-lg font-bold tracking-widest mb-3 focus:outline-none"
      style="background:#1a3352;border:1px solid rgba(56,189,248,0.2);color:#e2eaf4"
      onkeydown="if(event.key==='Enter') login()">
    <div id="login-error" class="hidden text-red-400 text-sm font-bold mb-3">❌ كلمة المرور غلط</div>
    <button onclick="login()" class="w-full grad text-white py-3 rounded-2xl font-bold shadow-md active:scale-95 transition-transform">
      دخول
    </button>
  </div>
</div>

<div id="admin-panel" class="hidden min-h-screen">

  <header class="sticky top-0 z-50 p-4 shadow-lg" style="background:#0a1828;border-bottom:1px solid rgba(56,189,248,0.1)">
    <div class="flex justify-between items-center max-w-2xl mx-auto">
      <div class="flex items-center gap-3">
        <div class="grad w-10 h-10 rounded-xl flex items-center justify-center shadow overflow-hidden">
          <img src="images/adminlogo.avif" alt="Logo" class="w-full h-full object-cover">
        </div>
        <div>
          <h1 class="font-black text-base leading-tight">لوحة التحكم</h1>
          <p class="text-[10px]" style="color:#7a9bbf">صيدلية د. هاني فاروق</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <div id="new-dot" class="hidden w-3 h-3 bg-yellow-400 rounded-full pulse-dot"></div>
        <button onclick="loadOrders()" id="refresh-btn"
          class="w-10 h-10 rounded-xl flex items-center justify-center"
          style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2)">
          <i class="fas fa-sync-alt text-sm" style="color:#38bdf8"></i>
        </button>
        <button onclick="logout()"
          class="w-10 h-10 rounded-xl flex items-center justify-center"
          style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2)">
          <i class="fas fa-sign-out-alt text-sm text-red-400"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="p-4 max-w-2xl mx-auto space-y-4">

    <div class="grid grid-cols-4 gap-2">
      <div class="card p-3 text-center">
        <div id="stat-total" class="text-xl font-black" style="color:#38bdf8">—</div>
        <div class="text-[9px] mt-1" style="color:#7a9bbf">الكل</div>
      </div>
      <div class="card p-3 text-center">
        <div id="stat-waiting" class="text-xl font-black text-yellow-400">—</div>
        <div class="text-[9px] mt-1" style="color:#7a9bbf">انتظار</div>
      </div>
      <div class="card p-3 text-center">
        <div id="stat-progress" class="text-xl font-black text-blue-400">—</div>
        <div class="text-[9px] mt-1" style="color:#7a9bbf">جاري</div>
      </div>
      <div class="card p-3 text-center">
        <div id="stat-done" class="text-xl font-black text-green-400">—</div>
        <div class="text-[9px] mt-1" style="color:#7a9bbf">تم</div>
      </div>
    </div>
<div class="relative">
      <input id="search-input" type="text" placeholder="ابحث بالاسم أو التليفون أو رقم الفاتورة..."
        oninput="applyFilter()"
        class="w-full p-3 pr-10 rounded-2xl text-sm focus:outline-none"
        style="background:#132640;border:1px solid rgba(56,189,248,0.15);color:#e2eaf4">
      <i class="fas fa-search absolute top-3.5 right-3 text-sm" style="color:#7a9bbf"></i>
    </div>

    <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
      <button onclick="setFilter('الكل',this)"      class="filter-btn filter-active px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap">الكل</button>
      <button onclick="setFilter('قيد الانتظار',this)" class="filter-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap">⏳ انتظار</button>
      <button onclick="setFilter('قيد التنفيذ',this)"  class="filter-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap">🔄 جاري</button>
      <button onclick="setFilter('تم التسليم',this)"   class="filter-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap">✅ تم</button>
      <button onclick="setFilter('ملغي',this)"          class="filter-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap">❌ ملغي</button>
    </div>

    <div id="orders-list" class="space-y-3">
      <div class="text-center py-16" style="color:#7a9bbf">
        <i class="fas fa-spinner fa-spin text-4xl mb-3 block"></i>
        <p class="font-bold text-sm">جاري التحميل...</p>
      </div>
    </div>

    <p id="last-update" class="text-center text-[10px] pb-6" style="color:#7a9bbf"></p>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  let allOrders     = [];
  let currentFilter = "الكل";
  let lastOrderIDs  = new Set();
  let isFirstLoad   = true;

  // 🔔 تسجيل الـ Service Worker للـ PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw-admin.js')
        .then(reg => console.log('Admin SW Registered'))
        .catch(err => console.log('SW Registration Failed', err));
    });
  }

  // 🔔 تشغيل صوت التنبيه الجديد MP3
  function playBeep() {
    const sound = document.getElementById("notification-sound");
    if (sound) {
      sound.currentTime = 0; // إعادة الصوت للبداية
      sound.play().catch(e => console.log("Audio play blocked by browser"));
    }
  }

  // ⏱️ وقت نسبي
  function timeAgo(dateStr) {
    if (!dateStr) return "";
    try {
      const parts = dateStr.match(/(\d+)\/(\d+)\/(\d+),?\s+(\d+):(\d+):(\d+)/);
      if (!parts) return dateStr;
      const d    = new Date(parts[3], parts[2]-1, parts[1], parts[4], parts[5], parts[6]);
      const diff = Math.floor((Date.now() - d) / 60000);
      if (diff < 1)    return "الآن";
      if (diff < 60)   return `منذ ${diff} دقيقة`;
      if (diff < 1440) return `منذ ${Math.floor(diff/60)} ساعة`;
      return `منذ ${Math.floor(diff/1440)} يوم`;
    } catch { return dateStr; }
  }

  // 🔐 تسجيل الدخول
  async function login() {
    const input = document.getElementById("password-input").value.trim();
    const errEl = document.getElementById("login-error");
    if (!input) return;
    try {
      const res  = await fetch(`${CONFIG.API_URL}?sheet=Admin`);
      const rows = await res.json();
      const saved = rows.find(r => r.SettingName === "AdminPassword")?.Value || "123456";
      if (input === String(saved)) {
        sessionStorage.setItem("admin_auth","true");
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("admin-panel").classList.remove("hidden");
        loadOrders();
      } else {
        errEl.classList.remove("hidden");
        document.getElementById("password-input").value = "";
        setTimeout(() => errEl.classList.add("hidden"), 2500);
      }
    } catch {
      if (input === "123456") {
        sessionStorage.setItem("admin_auth","true");
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("admin-panel").classList.remove("hidden");
        loadOrders();
      } else {
        errEl.classList.remove("hidden");
        setTimeout(() => errEl.classList.add("hidden"), 2500);
      }
    }
  }
  // 🚪 تسجيل الخروج
  function logout() {
    sessionStorage.removeItem("admin_auth");
    document.getElementById("admin-panel").classList.add("hidden");
    document.getElementById("login-screen").classList.remove("hidden");
    document.getElementById("password-input").value = "";
  }

  // 📦 تحميل الطلبات
  async function loadOrders() {
    const btn = document.getElementById("refresh-btn");
    if (!btn) return;
    btn.querySelector("i").classList.add("fa-spin");
    try {
      const res    = await fetch(`${CONFIG.API_URL}?sheet=Orders`);
      const data   = await res.json();
      const orders = data.filter(o => o.OrderID).reverse();

      // كشف الجديد وتشغيل صوت MP3
      if (!isFirstLoad) {
        const newOnes = orders.filter(o => !lastOrderIDs.has(String(o.OrderID)));
        if (newOnes.length > 0) {
          playBeep(); // الدالة التي عدلناها في الجزء الثاني
          const dot = document.getElementById("new-dot");
          if (dot) {
            dot.classList.remove("hidden");
            setTimeout(() => dot.classList.add("hidden"), 15000);
          }
        }
      }

      lastOrderIDs = new Set(orders.map(o => String(o.OrderID)));
      allOrders    = orders;
      isFirstLoad  = false;

      updateStats();
      applyFilter();
      document.getElementById("last-update").textContent =
        `آخر تحديث: ${new Date().toLocaleTimeString("ar-EG")}`;
    } catch (err) {
      document.getElementById("orders-list").innerHTML = `
        <div class="text-center py-16" style="color:#7a9bbf">
          <i class="fas fa-wifi text-4xl mb-3 block opacity-30"></i>
          <p class="font-bold text-sm">فشل تحميل الطلبات</p>
          <button onclick="loadOrders()" class="mt-3 grad text-white px-4 py-2 rounded-xl text-xs font-bold">إعادة المحاولة</button>
        </div>`;
    } finally {
      btn.querySelector("i").classList.remove("fa-spin");
    }
  }

  // 📊 إحصائيات
  function updateStats() {
    document.getElementById("stat-total").textContent    = allOrders.length;
    document.getElementById("stat-waiting").textContent  = allOrders.filter(o => o.Status === "قيد الانتظار").length;
    document.getElementById("stat-progress").textContent = allOrders.filter(o => o.Status === "قيد التنفيذ").length;
    document.getElementById("stat-done").textContent     = allOrders.filter(o => o.Status === "تم التسليم").length;
  }

  // 🗂️ فلتر
  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("filter-active"));
    btn.classList.add("filter-active");
    applyFilter();
  }

  // 🔍 تطبيق الفلتر + البحث
  function applyFilter() {
    const q = document.getElementById("search-input")?.value.trim().toLowerCase() || "";
    const filtered = allOrders.filter(o =>
      (currentFilter === "الكل" || o.Status === currentFilter) &&
      (!q ||
        o.CustomerName?.toLowerCase().includes(q) ||
        String(o.Phone).includes(q) ||
        String(o.OrderID).includes(q))
    );
    renderOrders(filtered);
  }

  // 🔄 تحديث حالة الأوردر
  async function updateStatus(orderID, newStatus) {
    try {
      await fetch(CONFIG.API_URL, {
        method:"POST", mode:"no-cors", cache:"no-cache",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ action:"updateStatus", sheet:"Orders", OrderID: orderID, Status: newStatus })
      });
      const order = allOrders.find(o => String(o.OrderID) === String(orderID));
      if (order) order.Status = newStatus;
      updateStats();
      applyFilter();
    } catch { alert("فشل تحديث الحالة"); }
  }

  // 📲 رسالة واتساب تأكيد مفصلة مع معالجة رقم التليفون
  function confirmOrder(order) {
    let phone = String(order.Phone || "").replace(/[^0-9]/g,"");
    
    // إضافة الصفر التلقائي إذا كان الرقم يبدأ بـ 1 (أرقام مصر المحمولة) وطوله 10
    if (phone.length === 10 && phone.startsWith("1")) {
      phone = "0" + phone;
    }
    
    const details = (order.OrderDetails || "").replace(/الموقع:?\s*https?:\/\/\S+/g,"").trim();
    let msg  = `🏥 *صيدلية د. هاني فاروق*\n`;
    msg += `━━━━━━━━━━━━━━━━━━\n`;
    msg += `✅ *تأكيد طلبك رقم #${order.OrderID}*\n`;
    msg += `━━━━━━━━━━━━━━━━━━\n`;
    msg += `👤 *الاسم:* ${order.CustomerName || "—"}\n`;
    msg += `📅 *التاريخ:* ${order.Date || "—"}\n`;
    msg += `━━━━━━━━━━━━━━━━━━\n`;
    msg += `🛒 *الأصناف:*\n${details || "—"}\n`;
    msg += `━━━━━━━━━━━━━━━━━━\n`;
    msg += `💰 *الإجمالي: ${order.Total || 0} ج.م*\n`;
    msg += `📦 *الحالة: ${order.Status || "قيد الانتظار"}*\n`;
    msg += `━━━━━━━━━━━━━━━━━━\n`;
    msg += `شكراً لتعاملك معنا! 🙏`;
    
    // إضافة كود الدولة لمصر 20 لضمان فتح الرابط بشكل صحيح عالمياً
    const finalPhone = phone.startsWith("0") ? "2" + phone : phone;
    window.open(`https://wa.me/${finalPhone}?text=${encodeURIComponent(msg)}`, "_blank");
  }
// 🎨 رسم الطلبات
  function renderOrders(list) {
    const container = document.getElementById("orders-list");
    if (list.length === 0) {
      container.innerHTML = `
        <div class="text-center py-16" style="color:#7a9bbf">
          <i class="fas fa-box-open text-4xl mb-3 block opacity-30"></i>
          <p class="font-bold text-sm">مفيش طلبات</p>
        </div>`;
      return;
    }

    container.innerHTML = list.map((order, i) => {
      const statusClass = {
        "قيد الانتظار":"status-waiting",
        "قيد التنفيذ" :"status-progress",
        "تم التسليم"  :"status-done",
        "ملغي"        :"status-cancel",
      }[order.Status] || "status-waiting";

      const locMatch     = order.OrderDetails?.match(/https:\/\/www\.google\.com\/maps[^\s]*/);
      const locationUrl  = locMatch ? locMatch[0] : null;
      const detailsClean = (order.OrderDetails || "").replace(/الموقع:?\s*https?:\/\/\S+/g,"").trim();
      
      // تجهيز بيانات الطلب لإرسالها للدالة كـ Object
      const orderData = JSON.stringify(order).replace(/'/g, "&apos;");

      return `
      <div class="card card-enter" style="animation-delay:${i*0.04}s">

        <div class="flex justify-between items-center p-4 pb-3" style="border-bottom:1px solid rgba(56,189,248,0.08)">
          <div class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center font-black text-xs"
              style="background:rgba(56,189,248,0.1);color:#38bdf8">#${order.OrderID || "—"}</div>
            <div>
              <p class="font-black text-sm">${order.CustomerName || "—"}</p>
              <p class="text-[10px]" style="color:#7a9bbf">${timeAgo(order.Date)}</p>
            </div>
          </div>
          <span class="text-[10px] font-bold px-3 py-1 rounded-full ${statusClass}">${order.Status || "قيد الانتظار"}</span>
        </div>

        <div class="p-4 space-y-2">
          <div class="flex items-center gap-2">
            <i class="fas fa-phone text-xs w-4" style="color:#38bdf8"></i>
            <a href="tel:${order.Phone}" class="text-sm font-bold" style="color:#60a5fa">${order.Phone || "—"}</a>
          </div>
          <div class="flex gap-2">
            <i class="fas fa-shopping-bag text-xs w-4 mt-0.5" style="color:#38bdf8"></i>
            <p class="text-xs leading-relaxed flex-1 whitespace-pre-line" style="color:#a0bcda">${detailsClean || "—"}</p>
          </div>
          ${order.Total ? `
          <div class="flex items-center gap-2">
            <i class="fas fa-coins text-xs w-4 text-yellow-400"></i>
            <span class="text-sm font-black text-yellow-400">${order.Total} ج.م</span>
          </div>` : ""}
        </div>

        <div class="px-4 pb-3">
          <select onchange="updateStatus('${order.OrderID}', this.value)">
            <option value="قيد الانتظار" ${order.Status==="قيد الانتظار"?"selected":""}>⏳ قيد الانتظار</option>
            <option value="قيد التنفيذ"  ${order.Status==="قيد التنفيذ" ?"selected":""}>🔄 قيد التنفيذ</option>
            <option value="تم التسليم"   ${order.Status==="تم التسليم"  ?"selected":""}>✅ تم التسليم</option>
            <option value="ملغي"          ${order.Status==="ملغي"        ?"selected":""}>❌ ملغي</option>
          </select>
        </div>

        <div class="flex gap-2 px-4 pb-4">
          <button onclick='confirmOrder(${orderData})'
            class="flex-1 bg-green-500 text-white text-xs font-bold py-2.5 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-transform">
            <i class="fab fa-whatsapp text-sm"></i> تأكيد الطلب
          </button>
          <a href="tel:${order.Phone}"
            class="flex-1 text-xs font-bold py-2.5 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-transform"
            style="background:rgba(56,189,248,0.1);color:#38bdf8;border:1px solid rgba(56,189,248,0.2)">
            <i class="fas fa-phone text-sm"></i> اتصال
          </a>
          ${locationUrl ? `
          <a href="${locationUrl}" target="_blank"
            class="flex-1 text-xs font-bold py-2.5 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-transform"
            style="background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.2)">
            <i class="fas fa-map-marker-alt text-sm"></i> موقع
          </a>` : ""}
        </div>

      </div>`;
    }).join("");
  }

  // ── تحقق من الجلسة ──
  window.onload = () => {
    if (sessionStorage.getItem("admin_auth") === "true") {
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("admin-panel").classList.remove("hidden");
      loadOrders();
    }
  };

  // ── تحديث تلقائي كل 30 ثانية ──
  setInterval(() => {
    if (sessionStorage.getItem("admin_auth") === "true") loadOrders();
  }, 30000);
</script>
</body>
</html>
