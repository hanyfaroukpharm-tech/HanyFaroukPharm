<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية د. هاني فاروق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-bold">صيدلية د. هاني فاروق</h1>
            <i class="fas fa-prescription-bottle-alt text-2xl"></i>
        </div>
    </header>

    <div class="m-4 bg-blue-100 p-6 rounded-2xl text-center border-2 border-blue-200">
        <h2 class="text-blue-800 font-bold text-lg">أهلاً بك في صيدليتك الرقمية</h2>
        <p class="text-blue-600 text-sm">أرسل الروشتة وسنقوم بتوصيل الدواء فوراً</p>
        <button class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-md">اطلب الآن</button>
    </div>

    <div class="p-4 grid grid-cols-2 gap-4" id="categories">
            <div class="p-4 flex justify-between items-center">
        <h3 class="font-bold text-lg">الأصناف المتوفرة</h3>
    </div>
    <div class="p-4 grid grid-cols-2 gap-4" id="products-list">
        <p class="text-center col-span-2 text-gray-400">جاري تحميل الأدوية...</p>
    </div>
    </div>

    <a href="#" id="whatsappBtn" class="fixed bottom-6 left-6 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-2xl z-50">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
    // الحصول على الرابط من البيئة أو وضعه مباشرة للتجربة السريعة
    const API_URL = "https://script.google.com/macros/s/AKfycbw6I4sitywB6Y3-_s8PFG_wolbbd_ysLw8WUdwmuLS26XmyyhUqWOrjKUoOCiJV1hx7/exec";

        async function loadAppData() {
        try {
            // 1. جلب إعدادات الواتساب من شيت Admin
            const adminRes = await fetch(`${API_URL}?sheet=Admin`);
            const adminData = await adminRes.json();
            const whatsapp = adminData.find(row => row.SettingName === 'WhatsAppNumber')?.Value;
            if (whatsapp) document.getElementById('whatsappBtn').href = `https://wa.me/${whatsapp}`;

            // 2. جلب المنتجات من شيت Products
            const productRes = await fetch(`${API_URL}?sheet=Products`);
            const products = await productRes.json();
            
            const productsContainer = document.getElementById('products-list');
            productsContainer.innerHTML = ''; // مسح محتوى التحميل

            if (products.length === 0) {
                productsContainer.innerHTML = '<p class="text-center col-span-2 text-gray-400">لا توجد أدوية متوفرة حالياً</p>';
                return;
            }

            products.forEach(item => {
                productsContainer.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center">
                        <img src="${item.Image || 'https://via.placeholder.com/100?text=Medicine'}" class="w-20 h-20 object-contain mb-2">
                        <h3 class="font-bold text-sm text-center">${item.Name}</h3>
                        <p class="text-blue-600 font-bold mt-1">${item.Price} ج.م</p>
                        <button onclick="addToCart('${item.Name}', ${item.Price})" class="mt-2 bg-blue-50 text-blue-600 px-4 py-1 rounded-lg text-xs font-bold w-full border border-blue-100">أضف</button>
                    </div>
                `;
            });

        } catch (error) {
            console.error("Error:", error);
        }
    }

    // تشغيل الدالة عند تحميل الصفحة
    window.onload = loadAppData;

    // دالة بسيطة للتنبيه عند الضغط على "اطلب الآن"
    document.querySelector('button').onclick = () => {
        alert("سيتم فتح نموذج طلب الروشتة في الخطوة القادمة!");
    };
</script>

</body>
</html>
