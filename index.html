<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صيدلية د. هاني فاروق</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <!-- ملف الـ Styles الخاص بينا -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="pb-24">

  <!-- ══════════════════════════════════
       الـ HEADER
  ══════════════════════════════════ -->
<header class="pharmacy-header sticky top-0 z-50 shadow-lg rounded-b-[2rem] overflow-hidden">
  
  <div class="header-cover-container">
    <img 
      src="images/cover.avif" 
      class="header-cover-img" 
      alt="غلاف الصيدلية" 
      onerror="this.parentElement.style.display='none'"
    >
    <div class="header-overlay"></div> 
  </div>

  <div class="relative z-10 h-full p-5 flex flex-col justify-end">
    
    <div class="flex items-center justify-start gap-3">
      <span id="pharmacy-status" class="status-badge">مفتوح الآن</span>
      
      <button id="search-btn" class="search-trigger-btn" aria-label="بحث">
        <i class="fas fa-search"></i>
      </button>
    </div>

    <div id="search-bar" class="hidden mt-3 animate-fade-in"> 
      <div class="flex items-center gap-2">
        <input
          id="search-input"
          type="text"
          placeholder="ابحث عن دواء أو منتج..."
          class="search-input-field"
        >
        <button id="close-search" class="close-search-btn bg-white/20 w-10 h-10 rounded-xl flex items-center justify-center text-white">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
  </div>
</header>

  <!-- ══════════════════════════════════
       الـ SLIDER (العروض)
  ══════════════════════════════════ -->
  <div class="mt-4 px-4">
    <div class="swiper mySwiper rounded-2xl overflow-hidden shadow-md">
      <div class="swiper-wrapper">

        <!-- عرض 1 -->
        <div class="swiper-slide">
          <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 h-36 flex flex-col justify-center text-white">
            <span class="text-xs bg-white/20 rounded-full px-3 py-1 w-fit mb-2">عرض محدود</span>
            <h4 class="text-xl font-black">خصم 15%</h4>
            <p class="text-sm opacity-90 mt-1">على منتجات العناية بالبشرة</p>
          </div>
        </div>

        <!-- عرض 2 -->
        <div class="swiper-slide">
          <div class="bg-gradient-to-br from-emerald-500 to-teal-700 p-6 h-36 flex flex-col justify-center text-white">
            <span class="text-xs bg-white/20 rounded-full px-3 py-1 w-fit mb-2">توصيل سريع</span>
            <h4 class="text-xl font-black">توصيل مجاني</h4>
            <p id="promo-free-delivery" class="text-sm opacity-90 mt-1">للطلبات فوق 300 جنيه</p>
          </div>
        </div>

        <!-- عرض 3 -->
        <div class="swiper-slide">
          <div class="bg-gradient-to-br from-violet-600 to-purple-800 p-6 h-36 flex flex-col justify-center text-white">
            <span class="text-xs bg-white/20 rounded-full px-3 py-1 w-fit mb-2">خدمة جديدة</span>
            <h4 class="text-xl font-black">ارسل روشتتك</h4>
            <p class="text-sm opacity-90 mt-1">وهنوصلك الدواء على طول</p>
          </div>
        </div>

      </div>
      <div class="swiper-pagination"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       بانر إرسال الروشتة
  ══════════════════════════════════ -->
  <div class="mx-4 my-4 bg-white p-4 rounded-2xl shadow-sm border border-blue-50 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="bg-blue-50 w-11 h-11 rounded-full flex items-center justify-center text-blue-600">
        <i class="fas fa-camera text-lg"></i>
      </div>
      <div>
        <h4 class="font-bold text-sm text-gray-800">ارسل روشتة</h4>
        <p class="text-[10px] text-gray-500">صور الروشتة وهنوصلك فوراً</p>
      </div>
    </div>
    <button onclick="UI.openCheckout()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow">
      طلب سريع
    </button>
  </div>

  <!-- ══════════════════════════════════
       تبويبات الكاتيجوري
  ══════════════════════════════════ -->
  <div id="tabs-container" class="flex gap-2 px-4 overflow-x-auto pb-3 no-scrollbar">
    <!-- يتملى من js/ui.js -->
  </div>

  <!-- ══════════════════════════════════
       قائمة المنتجات
  ══════════════════════════════════ -->
  <div class="px-4 grid grid-cols-2 gap-4" id="products-list">
    <!-- يتملى من js/products.js -->
  </div>

  <!-- ══════════════════════════════════
       زرار الواتساب العائم
  ══════════════════════════════════ -->
  <a href="#" id="whatsappBtn" target="_blank"
     class="fixed bottom-24 left-4 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-2xl z-50 border-4 border-white">
    <i class="fab fa-whatsapp"></i>
  </a>

  <!-- ══════════════════════════════════
       الـ NAV الثابت
  ══════════════════════════════════ -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-3 flex justify-around items-center z-50 rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">

    <!-- الرئيسية -->
    <div class="flex flex-col items-center text-blue-600">
      <i class="fas fa-home text-xl"></i>
      <span class="text-[10px] mt-1 font-bold">الرئيسية</span>
    </div>

    <!-- السلة (في المنتصف) -->
    <div class="flex flex-col items-center text-gray-400 relative" onclick="UI.openCheckout()">
      <div class="bg-blue-600 w-14 h-14 rounded-full flex items-center justify-center text-white absolute -top-10 shadow-xl border-4 border-white cursor-pointer active:scale-95 transition-transform">
        <i class="fas fa-shopping-cart"></i>
        <div id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] min-w-[20px] h-5 rounded-full flex items-center justify-center border-2 border-white px-1 font-bold">0</div>
      </div>
      <span id="cart-total-nav" class="text-[10px] mt-5 font-bold text-blue-600">0 ج.م</span>
    </div>

    <!-- حسابي -->
    <div class="flex flex-col items-center text-gray-400">
      <i class="fas fa-user text-xl"></i>
      <span class="text-[10px] mt-1">حسابي</span>
    </div>

  </nav>

  <!-- ══════════════════════════════════
       مودال الـ CHECKOUT
  ══════════════════════════════════ -->
  <div id="checkoutModal" class="modal">
    <div class="bg-white w-full rounded-t-3xl shadow-2xl max-h-[92vh] overflow-y-auto modal-sheet">

      <!-- الهيدر -->
      <div class="flex justify-between items-center p-5 border-b border-gray-100 sticky top-0 bg-white rounded-t-3xl">
        <h3 class="text-lg font-bold text-gray-800">🛒 إتمام الطلب</h3>
        <button onclick="UI.closeCheckout()" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-500">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="p-5 space-y-4">

        <!-- قائمة المنتجات في السلة -->
        <div id="cart-items-preview" class="space-y-2">
          <!-- يتملى من cart.js -->
        </div>

        <!-- الإجمالي -->
        <div class="flex justify-between items-center font-bold text-lg text-blue-700 py-3 border-y border-dashed border-blue-100">
          <span>الإجمالي</span>
          <span id="cart-total-display">0 ج.م</span>
        </div>

        <!-- بيانات العميل -->
        <div class="space-y-3">
          <h4 class="font-bold text-gray-700 text-sm">بيانات التوصيل</h4>

          <input
            type="text" id="cust-name"
            placeholder="الاسم بالكامل"
            class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm font-bold"
          >
          <input
            type="tel" id="cust-phone"
            placeholder="رقم الموبايل"
            class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm"
          >
          <div class="relative">
            <textarea
              id="cust-address"
              placeholder="العنوان بالتفصيل (الشارع، العمارة، الدور...)"
              class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm h-24 resize-none"
            ></textarea>
            <button
              id="location-btn"
              onclick="Order.getLocation()"
              class="absolute left-2 bottom-2 bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-[11px] font-bold border border-blue-200 flex items-center gap-1"
            >
              <i class="fas fa-map-marker-alt"></i> تحديد موقعي
            </button>
          </div>
          <div id="location-status" class="hidden text-xs text-emerald-600 font-bold flex items-center gap-1">
            <i class="fas fa-check-circle"></i> تم تحديد الموقع بنجاح
          </div>
        </div>

        <!-- زرار الإرسال -->
        <button
          id="sendBtn"
          onclick="Order.submit()"
          class="w-full pharmacy-gradient text-white py-4 rounded-2xl font-bold shadow-lg text-base active:scale-95 transition-transform"
        >
          <i class="fab fa-whatsapp ml-2"></i> تأكيد وإرسال الطلب
        </button>

      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       المكتبات والـ Scripts
  ══════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <!-- ملفات الـ JS بالترتيب الصحيح -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/products.js"></script>
  <script src="js/order.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
